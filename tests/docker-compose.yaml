---
name: test
services:
  ## Connection Test ##
  connection_test:
    command: >
      bash -c "apt-get update
      && apt-get install --no-install-recommends --yes netcat-openbsd
      && nc -zv app 49"
    container_name: connection_test
    depends_on:
      - app
    image: debian:trixie-slim
    networks:
      - test
    platform: linux/amd64
    restart: "no"
  ## tac_plus-ng ##
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: app
    environment:
      - "TACPLUS_CFG_FILE=/opt/tac_plus-ng.cfg"
    networks:
      - test
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - source: ./config/tac_plus-ng.cfg
        target: /opt/tac_plus-ng.cfg
        type: bind
networks:
  test:
    name: test
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.42.0.0/24
        - subnet: fdea:420:cafe::/64
